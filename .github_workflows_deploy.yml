name: Auto Deploy to Vercel

on:
  push:
    branches: [ main ]
  # ✅ เพิ่มให้สั่งรันเองจากหน้า GitHub ได้ด้วย
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # ✅ ดึงประวัติโค้ดครบถ้วน ป้องกันข้อผิดพลาด

      - name: Deploy to Vercel
        uses: BetaHuhn/deploy-to-vercel-action@v1
        with:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
          
          # ✅ เพิ่มการตั้งค่าความเสถียร
          PRODUCTION: true  # deploy เป็นเวอร์ชันจริงโดยตรง
          GITHUB_DEPLOYMENT_ENVIRONMENT: production
          DELETE_EXISTING_COMMENT: true
